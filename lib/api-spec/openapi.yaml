openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: SongBook API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: songs
    description: Song library operations
  - name: tags
    description: Tag operations
  - name: sets
    description: Set operations
  - name: ug
    description: Ultimate Guitar integration
  - name: Storage
    description: Object storage upload and serving endpoints.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with app password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResult"
        "401":
          description: Invalid password

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResult"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Check auth status
      responses:
        "200":
          description: Auth status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResult"
        "401":
          description: Not authenticated

  /songs:
    get:
      operationId: listSongs
      tags: [songs]
      summary: List all songs with optional filtering
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: tagId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of songs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Song"
    post:
      operationId: createSong
      tags: [songs]
      summary: Create a new song
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SongInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Song"

  /songs/stats:
    get:
      operationId: getSongStats
      tags: [songs]
      summary: Get library stats
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryStats"

  /songs/{id}:
    get:
      operationId: getSong
      tags: [songs]
      summary: Get a song by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Song
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Song"
        "404":
          description: Not found
    patch:
      operationId: updateSong
      tags: [songs]
      summary: Update a song
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SongUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Song"
        "404":
          description: Not found
    delete:
      operationId: deleteSong
      tags: [songs]
      summary: Delete a song
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /songs/{id}/tags:
    post:
      operationId: addTagToSong
      tags: [songs]
      summary: Add a tag to a song
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TagAssignment"
      responses:
        "200":
          description: Updated song
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Song"

  /songs/{id}/tags/{tagId}:
    delete:
      operationId: removeTagFromSong
      tags: [songs]
      summary: Remove a tag from a song
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: tagId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Updated song
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Song"

  /tags:
    get:
      operationId: listTags
      tags: [tags]
      summary: List all tags
      responses:
        "200":
          description: Tags
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tag"
    post:
      operationId: createTag
      tags: [tags]
      summary: Create a tag
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TagInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tag"

  /tags/{id}:
    patch:
      operationId: updateTag
      tags: [tags]
      summary: Update a tag
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TagUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tag"
    delete:
      operationId: deleteTag
      tags: [tags]
      summary: Delete a tag
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /sets:
    get:
      operationId: listSets
      tags: [sets]
      summary: List all sets
      responses:
        "200":
          description: Sets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SongSet"
    post:
      operationId: createSet
      tags: [sets]
      summary: Create a set
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SongSetInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SongSet"

  /sets/{id}:
    get:
      operationId: getSet
      tags: [sets]
      summary: Get a set with its songs
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Set with songs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SongSetDetail"
        "404":
          description: Not found
    patch:
      operationId: updateSet
      tags: [sets]
      summary: Update a set
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SongSetUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SongSet"
    delete:
      operationId: deleteSet
      tags: [sets]
      summary: Delete a set
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /sets/{id}/songs:
    post:
      operationId: addSongToSet
      tags: [sets]
      summary: Add a song to a set
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetSongAdd"
      responses:
        "200":
          description: Updated set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SongSetDetail"

  /sets/{id}/songs/{songId}:
    delete:
      operationId: removeSongFromSet
      tags: [sets]
      summary: Remove a song from a set
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: songId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Updated set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SongSetDetail"

  /sets/{id}/reorder:
    patch:
      operationId: reorderSetSongs
      tags: [sets]
      summary: Reorder songs in a set
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetReorder"
      responses:
        "200":
          description: Updated set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SongSetDetail"

  /ug/search:
    get:
      operationId: ugSearch
      tags: [ug]
      summary: Search Ultimate Guitar
      parameters:
        - name: title
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UgSearchResults"

  /ug/explore:
    get:
      operationId: ugExplore
      tags: [ug]
      summary: Explore popular tabs on UG
      responses:
        "200":
          description: Popular tabs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UgSearchResults"

  /ug/tab/{id}:
    get:
      operationId: ugGetTab
      tags: [ug]
      summary: Get a specific UG tab
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Tab detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UgTab"

  /ug/import:
    post:
      operationId: ugImportTab
      tags: [ug]
      summary: Import a UG tab into the song library
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UgImportInput"
      responses:
        "201":
          description: Imported song
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Song"

  /ug/playlist/preview:
    post:
      operationId: ugPlaylistPreview
      tags: [ug]
      summary: Preview songs from a shared Ultimate Guitar playlist link
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UgPlaylistPreviewInput"
      responses:
        "200":
          description: Playlist preview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UgPlaylistPreview"
        "400":
          description: Invalid or unreadable playlist link
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /ug/playlist/import:
    post:
      operationId: ugPlaylistImport
      tags: [ug]
      summary: Import previewed playlist songs into a set
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UgPlaylistImportInput"
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UgPlaylistImportResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /media/search/youtube:
    get:
      operationId: searchYoutube
      tags: [media]
      summary: Search YouTube for videos to attach to a song
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaSearchResults"

  /media/search/spotify:
    get:
      operationId: searchSpotify
      tags: [media]
      summary: Search Spotify for tracks to attach to a song
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaSearchResults"
        "503":
          description: Spotify search is not configured on the server
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      description: |
        Returns a presigned GCS URL for direct upload. The client sends JSON
        metadata here, then uploads the file directly to the returned URL.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadUrlRequest"
      responses:
        "200":
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"
        "400":
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an object entity from PRIVATE_OBJECT_DIR
      description: |
        Serves object entities uploaded via presigned URLs. Supports HTTP Range
        requests for media scrubbing.
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
          description: Object path within the private object dir (e.g. `uploads/some-uuid`).
      responses:
        "200":
          description: Object content streamed with correct Content-Type.
          content:
            "*/*":
              schema:
                type: string
                format: binary
        "404":
          description: Object not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Failed to serve object.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    SuccessResult:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string

    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
          description: Original file name.
        size:
          type: integer
          minimum: 1
          description: File size in bytes.
        contentType:
          type: string
          minLength: 1
          description: MIME type of the file (e.g. `audio/mpeg`).

    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
          description: Presigned GCS URL for PUT upload.
        objectPath:
          type: string
          description: Normalized object path (e.g. `/objects/uploads/uuid`). Store this in your database.
        metadata:
          $ref: "#/components/schemas/UploadUrlRequest"

    LoginInput:
      type: object
      required: [password]
      properties:
        password:
          type: string

    AuthResult:
      type: object
      required: [authenticated]
      properties:
        authenticated:
          type: boolean
        token:
          type: ["string", "null"]

    Tag:
      type: object
      required: [id, name, color]
      properties:
        id:
          type: string
        name:
          type: string
        color:
          type: string

    TagInput:
      type: object
      required: [name, color]
      properties:
        name:
          type: string
        color:
          type: string

    TagUpdate:
      type: object
      properties:
        name:
          type: string
        color:
          type: string

    TagAssignment:
      type: object
      required: [tagId]
      properties:
        tagId:
          type: string

    Song:
      type: object
      required: [id, title, artist, lyricsChords, mediaType, rating, status, createdAt]
      properties:
        id:
          type: string
        title:
          type: string
        artist:
          type: string
        meta:
          type: ["string", "null"]
        lyricsChords:
          type: string
        originalUgId:
          type: ["string", "null"]
        spotifyLink:
          type: ["string", "null"]
        mediaType:
          type: string
          enum: [none, audio, spotify, youtube]
        audioUrl:
          type: ["string", "null"]
        audioFileName:
          type: ["string", "null"]
        audioContentType:
          type: ["string", "null"]
        audioSize:
          type: ["integer", "null"]
        youtubeUrl:
          type: ["string", "null"]
        rating:
          type: ["integer", "null"]
          minimum: 1
          maximum: 5
        status:
          type: string
          enum: [new, practicing, polishing, performance_ready]
        createdAt:
          type: string
        tags:
          type: array
          items:
            $ref: "#/components/schemas/Tag"

    SongInput:
      type: object
      required: [title, artist, lyricsChords]
      properties:
        title:
          type: string
        artist:
          type: string
        meta:
          type: string
        lyricsChords:
          type: string
        spotifyLink:
          type: string
        youtubeUrl:
          type: string
        mediaType:
          type: string
          enum: [none, audio, spotify, youtube]
        rating:
          type: ["integer", "null"]
          minimum: 1
          maximum: 5
        status:
          type: string
          enum: [new, practicing, polishing, performance_ready]

    SongUpdate:
      type: object
      properties:
        title:
          type: string
        artist:
          type: string
        meta:
          type: string
        lyricsChords:
          type: string
        spotifyLink:
          type: ["string", "null"]
        mediaType:
          type: string
          enum: [none, audio, spotify, youtube]
        audioUrl:
          type: ["string", "null"]
        audioFileName:
          type: ["string", "null"]
        audioContentType:
          type: ["string", "null"]
        audioSize:
          type: ["integer", "null"]
        youtubeUrl:
          type: ["string", "null"]
        rating:
          type: ["integer", "null"]
          minimum: 1
          maximum: 5
        status:
          type: string
          enum: [new, practicing, polishing, performance_ready]

    SongSet:
      type: object
      required: [id, title, createdAt, songCount]
      properties:
        id:
          type: string
        title:
          type: string
        createdAt:
          type: string
        songCount:
          type: integer

    SongSetInput:
      type: object
      required: [title]
      properties:
        title:
          type: string

    SongSetUpdate:
      type: object
      properties:
        title:
          type: string

    SetSong:
      type: object
      required: [id, title, artist, sortOrder, status]
      properties:
        id:
          type: string
        title:
          type: string
        artist:
          type: string
        meta:
          type: ["string", "null"]
        rating:
          type: ["integer", "null"]
          minimum: 1
          maximum: 5
        status:
          type: string
          enum: [new, practicing, polishing, performance_ready]
        sortOrder:
          type: integer

    SongSetDetail:
      type: object
      required: [id, title, createdAt, songs]
      properties:
        id:
          type: string
        title:
          type: string
        createdAt:
          type: string
        songs:
          type: array
          items:
            $ref: "#/components/schemas/SetSong"

    SetSongAdd:
      type: object
      required: [songId]
      properties:
        songId:
          type: string

    SetReorder:
      type: object
      required: [songIds]
      properties:
        songIds:
          type: array
          items:
            type: string

    LibraryStats:
      type: object
      required: [totalSongs, totalSets, totalTags, recentSongs]
      properties:
        totalSongs:
          type: integer
        totalSets:
          type: integer
        totalTags:
          type: integer
        recentSongs:
          type: array
          items:
            $ref: "#/components/schemas/Song"

    UgTabSummary:
      type: object
      required: [id, title, artist, type, rating, votes]
      properties:
        id:
          type: string
        title:
          type: string
        artist:
          type: string
        type:
          type: string
        rating:
          type: number
        votes:
          type: integer
        version:
          type: ["integer", "null"]

    UgSearchResults:
      type: object
      required: [tabs]
      properties:
        tabs:
          type: array
          items:
            $ref: "#/components/schemas/UgTabSummary"

    MediaSearchItem:
      type: object
      required: [id, url, title]
      properties:
        id:
          type: string
        url:
          type: string
        title:
          type: string
        subtitle:
          type: ["string", "null"]
        thumbnail:
          type: ["string", "null"]
        durationLabel:
          type: ["string", "null"]

    MediaSearchResults:
      type: object
      required: [results]
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/MediaSearchItem"

    UgTab:
      type: object
      required: [id, title, artist, type, lyricsChords]
      properties:
        id:
          type: string
        title:
          type: string
        artist:
          type: string
        type:
          type: string
        lyricsChords:
          type: string
        rating:
          type: ["number", "null"]
        votes:
          type: ["integer", "null"]

    UgImportInput:
      type: object
      required: [ugId, title, artist, lyricsChords]
      properties:
        ugId:
          type: string
        title:
          type: string
        artist:
          type: string
        meta:
          type: string
        lyricsChords:
          type: string

    UgPlaylistPreviewInput:
      type: object
      required: [url]
      properties:
        url:
          type: string
          maxLength: 2048
          description: A shared Ultimate Guitar playlist link.

    UgPlaylistPreviewItem:
      type: object
      required: [tabId, title, artist, status]
      properties:
        tabId:
          type: string
        title:
          type: string
        artist:
          type: string
        status:
          type: string
          enum: [new, duplicate]
        existingSongId:
          type: ["string", "null"]

    UgPlaylistPreview:
      type: object
      required: [playlistName, setExists, items]
      properties:
        playlistName:
          type: string
        setExists:
          type: boolean
        items:
          type: array
          items:
            $ref: "#/components/schemas/UgPlaylistPreviewItem"

    UgPlaylistImportItem:
      type: object
      required: [tabId, title, artist]
      properties:
        tabId:
          type: string
          pattern: "^[0-9]+$"
          maxLength: 32
        title:
          type: string
          maxLength: 500
        artist:
          type: string
          maxLength: 500
        existingSongId:
          type: ["string", "null"]

    UgPlaylistImportInput:
      type: object
      required: [items]
      properties:
        setName:
          type: ["string", "null"]
          maxLength: 200
        setId:
          type: ["string", "null"]
